<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feliz vida</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f1;
    --ink: #262421;
    --ink-soft: #55514a;
    --yellow: #f0b429;
    --blue: #3f6fa8;
    --line: #e4ded2;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--cream);
    font-family: 'Courier Prime', 'Courier New', monospace;
    color: var(--ink);
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    position: relative;
    overflow-x: hidden;
  }

  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .heart {
    position: absolute;
    top: -40px;
    font-size: 18px;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    8% { opacity: 0.5; }
    92% { opacity: 0.35; }
    100% { transform: translateY(112vh) rotate(20deg); opacity: 0; }
  }

  .burst {
    position: fixed;
    font-size: 18px;
    pointer-events: none;
    z-index: 5;
    animation: floatUp 1.8s ease-out forwards;
  }

  @keyframes floatUp {
    0% { transform: translate(0, 0) scale(0.6); opacity: 0; }
    15% { opacity: 1; transform: translate(var(--dx-early, 0px), -20px) scale(1); }
    100% { transform: translate(var(--dx, 0px), -160px) scale(1); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 620px;
    background: #fffefb;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 48px 40px 40px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    opacity: 0;
    animation: appear 0.9s ease forwards 0.15s;
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    text-align: left;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }

  h1 {
    text-align: left;
    font-family: 'Courier Prime', monospace;
    font-weight: 700;
    font-size: clamp(26px, 5vw, 36px);
    line-height: 1.35;
    margin: 0 0 28px;
    letter-spacing: -0.01em;
  }

  h1 .yellow {
    color: var(--yellow);
  }

  .rule {
    width: 100%;
    height: 1px;
    background: var(--line);
    margin: 0 0 28px;
  }

  .message {
    text-align: left;
    font-size: 16px;
    line-height: 1.85;
    color: var(--ink);
    white-space: pre-wrap;
    min-height: 420px;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 1em;
    background: var(--yellow);
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 0.9s steps(1) infinite;
  }

  .cursor.hidden { display: none; }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .footer-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .footer-row.show { opacity: 1; }

  .gift-btn {
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 22px;
    line-height: 1;
    padding: 10px 16px;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    transition: border-color 0.2s ease, transform 0.15s ease;
  }

  .gift-btn:hover {
    border-color: var(--blue);
  }

  .gift-btn.pop {
    animation: pop 0.5s ease;
  }

  @keyframes pop {
    0% { transform: scale(1) rotate(0deg); }
    30% { transform: scale(1.15) rotate(-6deg); }
    60% { transform: scale(0.95) rotate(4deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .hint {
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
  }

  .reveal {
    text-align: left;
    font-size: 14px;
    color: var(--blue);
    margin: 16px 0 0;
    opacity: 0;
    transition: opacity 0.7s ease;
  }

  .reveal.show { opacity: 1; }

  @media (max-width: 480px) {
    .card { padding: 34px 22px 28px; }
    .message { min-height: 460px; }
  }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card">
  <p class="eyebrow">para ti, hoy</p>
  <h1>Feliz vida,<br>al que alegra la mía <span class="yellow">🎂💛</span></h1>
  <div class="rule"></div>
  <div class="message" id="message"><span class="cursor" id="cursor"></span></div>

  <div class="footer-row" id="footerRow">
    <button class="gift-btn" id="giftBtn" aria-label="Abrir el regalo">🎁</button>
    <span class="hint">toca el regalo</span>
  </div>
  <p class="reveal" id="revealText"></p>
</div>

<script>
  const text1 = "Mi niño, solo puedo estar agradecida por un año más de vida para ti, y por haberte conocido. Eres un hombre maravilloso y te mereces todo el amor y todo lo bueno del mundo. Que hoy y siempre tengas mucha felicidad y sabiduría para que brilles en este camino tan bonito llamado vida.";
  const text2 = "Que este nuevo año te regrese todo el bien que tú das sin esperar nada a cambio. Que se cumplan tus metas, que tu trabajo y tus proyectos prosperen, que tu salud sea fuerte, que Dios te siga guiando en cada paso, y que la vida te siga regalando motivos para sonreír. Te quiero muchísimo, feliz cumpleaños.";
  const text3 = "Pd: ya tienes mi número de teléfono así que este año:";

  const messageEl = document.getElementById('message');
  const cursorEl = document.getElementById('cursor');
  const footerRow = document.getElementById('footerRow');

  function typeText(text, speed, onDone) {
    let i = 0;
    const interval = setInterval(() => {
      cursorEl.insertAdjacentText('beforebegin', text[i]);
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        if (onDone) onDone();
      }
    }, speed);
  }

  function newLine() {
    messageEl.insertBefore(document.createTextNode('\n\n'), cursorEl);
  }

  window.addEventListener('load', () => {
    setTimeout(() => {
      typeText(text1, 85, () => {
        setTimeout(() => {
          newLine();
          typeText(text2, 85, () => {
            setTimeout(() => {
              newLine();
              typeText(text3, 85, () => {
                setTimeout(() => {
                  footerRow.classList.add('show');
                }, 400);
              });
            }, 1000);
          });
        }, 1000);
      });
    }, 400);
  });

  const heartsContainer = document.getElementById('hearts');

  function spawnHeart() {
    const el = document.createElement('span');
    el.className = 'heart';
    el.textContent = '💙';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (14 + Math.random() * 14) + 'px';
    const duration = 15 + Math.random() * 9;
    el.style.animationDuration = duration + 's';
    heartsContainer.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000 + 500);
  }

  setInterval(spawnHeart, 2600);
  spawnHeart();

  const giftBtn = document.getElementById('giftBtn');
  const revealText = document.getElementById('revealText');
  const revealLines = [
    "vale por una cena preparada por mí, a tu elección. 💙",
    "vale por una tarde sin preocupaciones. 💙",
    "vale por un “hoy mando yo”... y tú disfrutas. 😉"
  ];
  let giftOpens = 0;

  function burstFromButton() {
    const rect = giftBtn.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top;
    const symbols = ['💙', '🎁', '💌', '✨'];
    for (let i = 0; i < 14; i++) {
      setTimeout(() => {
        const el = document.createElement('span');
        el.className = 'burst';
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = originX + 'px';
        el.style.top = originY + 'px';
        el.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
        el.style.setProperty('--dx-early', (Math.random() * 40 - 20) + 'px');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1900);
      }, i * 45);
    }
  }

  giftBtn.addEventListener('click', () => {
    giftBtn.classList.remove('pop');
    void giftBtn.offsetWidth;
    giftBtn.classList.add('pop');
    burstFromButton();
    revealText.textContent = revealLines[giftOpens % revealLines.length];
    revealText.classList.add('show');
    giftOpens++;
  });
</script>

</body>
</html>
